<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sparsh — June 13th 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Playfair+Display:wght@700;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --gold: #FFD700;
    --gold-dark: #C8A200;
    --gold-light: #FFF0A0;
    --purple: #2D1B69;
    --purple-mid: #4A2E9E;
    --purple-light: #7B5CF0;
    --rose: #FF6B6B;
    --teal: #00CED1;
    --bg: #0F0A2E;
    --surface: #1A1040;
    --surface2: #231550;
    --text: #F5F0FF;
    --text-dim: #A89CC8;
    --border: rgba(255,215,0,0.25);
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(123,92,240,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(255,107,107,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(45,27,105,0.5) 0%, transparent 80%);
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--purple) 0%, #1a0a50 50%, var(--purple-mid) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 10px 14px 10px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
    line-height: 1.2;
  }
  h1 span { color: var(--text); font-size: 0.75em; display: block; font-weight: 700; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  /* ── BUTTONS ── */
  .btn {
    border: none; cursor: pointer; border-radius: 8px;
    font-family: 'Poppins', sans-serif; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.18s ease; white-space: nowrap;
    font-size: clamp(0.75rem, 3vw, 0.875rem);
  }
  .btn-icon { width: 40px; height: 40px; padding: 0; justify-content: center; font-size: 1.1rem; border-radius: 10px; }
  .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1a0a50; padding: 10px 18px; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 10px 16px; }
  .btn-secondary:hover { border-color: var(--gold); background: var(--purple); }
  .btn-ghost { background: transparent; color: var(--gold); border: 1px solid var(--border); padding: 8px 14px; }
  .btn-ghost:hover { background: rgba(255,215,0,0.1); }
  .btn-danger { background: rgba(255,107,107,0.15); color: var(--rose); border: 1px solid rgba(255,107,107,0.3); padding: 8px 12px; }
  .btn-danger:hover { background: rgba(255,107,107,0.25); }
  .btn-sm { font-size: 0.75rem; padding: 6px 10px; }
  .btn:active { transform: scale(0.96); }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 8px 12px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .toolbar .spacer { flex: 1; }
  #status-msg {
    font-size: 0.75rem; color: var(--text-dim);
    padding: 4px 10px; background: var(--surface2);
    border-radius: 20px; border: 1px solid var(--border);
    flex-shrink: 0;
  }
  #status-msg.ok { color: #7fff9a; border-color: rgba(127,255,154,0.3); }
  #status-msg.err { color: var(--rose); border-color: rgba(255,107,107,0.3); }

  /* ── TABLE WRAPPER ── */
  .table-wrap {
    padding: 8px 8px 80px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  table {
    width: 100%; border-collapse: separate; border-spacing: 0 4px;
    min-width: 520px;
  }
  thead tr { background: transparent; }
  thead th {
    padding: 7px 8px; text-align: left;
    font-size: clamp(0.68rem, 2.3vw, 0.78rem);
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { width: 36px; text-align: center; }
  thead th:nth-child(2) { width: 42px; text-align: center; }

  /* ── ROWS ── */
  tbody tr {
    background: var(--surface);
    border-radius: var(--radius);
    transition: background 0.15s, box-shadow 0.15s;
    cursor: grab;
  }
  tbody tr:hover { background: var(--surface2); box-shadow: 0 4px 16px rgba(123,92,240,0.2); }
  tbody tr.dragging { opacity: 0.5; cursor: grabbing; }
  tbody tr.drag-over { box-shadow: 0 0 0 2px var(--gold); background: rgba(255,215,0,0.08); }
  tbody td {
    padding: 7px 8px;
    font-size: clamp(0.78rem, 2.8vw, 0.88rem);
    vertical-align: middle;
    border-top: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  tbody td:first-child { border-radius: var(--radius) 0 0 var(--radius); border-left: 1px solid rgba(255,255,255,0.06); }
  tbody td:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-right: 1px solid rgba(255,255,255,0.06); }

  .drag-handle { cursor: grab; color: var(--text-dim); font-size: 1.1rem; text-align: center; user-select: none; touch-action: none; }
  .row-num {
    font-family: 'Playfair Display', serif; font-weight: 700;
    color: var(--gold); font-size: clamp(1rem, 4vw, 1.15rem);
    text-align: center; min-width: 36px;
  }

  /* ── INLINE EDIT ── */
  .cell-text { cursor: pointer; min-height: 1.4em; }
  .cell-text:hover { color: var(--gold-light); }
  .cell-input {
    background: rgba(255,255,255,0.07); border: 1.5px solid var(--purple-light);
    color: var(--text); border-radius: 6px; padding: 6px 10px;
    font-family: 'Poppins', sans-serif; font-size: inherit;
    width: 100%; outline: none; transition: border-color 0.15s;
  }
  .cell-input:focus { border-color: var(--gold); }

  /* ── SINGERS MULTI-SELECT ── */
  .singers-display { display: flex; flex-wrap: wrap; gap: 4px; cursor: pointer; }
  .singer-chip {
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
    color: #fff; border-radius: 20px; padding: 3px 10px;
    font-size: clamp(0.65rem, 2.5vw, 0.75rem); font-weight: 600;
    white-space: nowrap;
  }
  .singer-chip.empty { background: var(--surface2); color: var(--text-dim); border: 1px dashed var(--border); }

  .singers-popup {
    position: fixed; z-index: 500;
    background: var(--surface2); border: 1.5px solid var(--purple-light);
    border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow);
    min-width: 200px; max-width: 280px;
  }
  .singers-popup h4 { color: var(--gold); font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .singer-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    margin-bottom: 4px; transition: background 0.12s;
    font-size: clamp(0.85rem, 3vw, 0.95rem);
  }
  .singer-option:hover { background: rgba(123,92,240,0.2); }
  .singer-option input[type=checkbox] {
    width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer;
  }
  .singers-popup-footer { margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end; }

  /* ── KARAOKE LINK CELL ── */
  .link-cell { display: flex; align-items: center; gap: 6px; }
  .link-cell .cell-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; font-size: 0.78rem; color: var(--text-dim); }
  .play-btn {
    background: linear-gradient(135deg, #00CED1, #007a7c);
    border: none; border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; font-size: 0.75rem;
    transition: transform 0.15s, filter 0.15s; color: #fff;
  }
  .play-btn:hover { transform: scale(1.15); filter: brightness(1.2); }
  .play-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── ROW ACTIONS ── */
  .row-actions { display: flex; gap: 6px; align-items: center; }

  /* ── ADD SONG FORM ── */
  .add-form {
    margin: 0 12px 12px; padding: 16px 18px;
    background: var(--surface2); border-radius: var(--radius);
    border: 1.5px solid var(--purple-light);
    animation: slideDown 0.2s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .add-form h3 { color: var(--gold); font-size: 0.9rem; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-group label { font-size: 0.72rem; color: var(--text-dim); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input {
    width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px;
    font-family: 'Poppins', sans-serif; font-size: clamp(0.85rem, 3vw, 0.95rem);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-singers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .form-singer-btn {
    border: 1.5px solid var(--border); background: var(--surface); color: var(--text-dim);
    border-radius: 20px; padding: 5px 14px; cursor: pointer; font-family: 'Poppins', sans-serif;
    font-size: clamp(0.75rem, 3vw, 0.85rem); transition: all 0.15s;
  }
  .form-singer-btn.selected { background: var(--purple-mid); border-color: var(--purple-light); color: #fff; font-weight: 600; }
  .form-actions { margin-top: 14px; display: flex; gap: 8px; justify-content: flex-end; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal { background: var(--surface2); border-radius: 16px; border: 1.5px solid var(--purple-light); width: 100%; max-width: 560px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 4vw, 1.2rem); color: var(--gold); }
  .modal-close { background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; padding: 4px; }
  .modal-close:hover { color: var(--rose); }
  .modal-body { padding: 20px; }
  .video-wrap { position: relative; padding-top: 56.25%; border-radius: 10px; overflow: hidden; background: #000; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
  .video-link-msg { color: var(--text-dim); font-size: 0.9rem; text-align: center; padding: 20px; }
  .video-link-msg a { color: var(--teal); text-decoration: none; }
  .video-link-msg a:hover { text-decoration: underline; }

  /* ── LOADING ── */
  .loading-wrap { padding: 60px 20px; text-align: center; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY ── */
  .empty-state { padding: 60px 20px; text-align: center; color: var(--text-dim); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 24px;
    padding: 10px 22px; font-size: 0.875rem; z-index: 2000;
    transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; pointer-events: none;
    box-shadow: var(--shadow); white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(127,255,154,0.4); color: #7fff9a; }
  #toast.error { border-color: rgba(255,107,107,0.4); color: var(--rose); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--purple-mid); border-radius: 2px; }

  /* ── TITLE ANIMATION ── */
  .title-block { display: flex; flex-direction: column; gap: 2px; }
  #sparshTitle {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateX(-60px);
    animation: slideInLeft 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    line-height: 1;
  }
  .mic-svg {
    width: clamp(1.6rem, 6vw, 2.2rem);
    height: clamp(1.6rem, 6vw, 2.2rem);
    flex-shrink: 0;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  }
  .sparsh-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.3rem, 5.5vw, 1.9rem);
    font-weight: 700;
    background: linear-gradient(90deg, #FFD700 0%, #fff0a0 40%, #7B5CF0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.08em;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.35));
  }
  .show-date {
    font-size: clamp(0.65rem, 2.6vw, 0.8rem);
    color: var(--gold-light);
    font-weight: 500;
    letter-spacing: 0.08em;
    padding-left: 2px;
    opacity: 0;
    transform: translateX(-40px);
    animation: slideInLeft 0.6s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
  }
  @keyframes slideInLeft {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── COMPACT TABLE ── */
  @media (max-width: 480px) {
    .link-cell .cell-text { max-width: 70px; }
    thead th:last-child { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="title-block">
      <h1 id="sparshTitle">
        <svg class="mic-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="micGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#FFD700"/>
              <stop offset="100%" stop-color="#7B5CF0"/>
            </linearGradient>
          </defs>
          <rect x="9" y="2" width="6" height="11" rx="3" fill="url(#micGrad)"/>
          <path d="M5 11a7 7 0 0 0 14 0" stroke="url(#micGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <line x1="12" y1="18" x2="12" y2="22" stroke="url(#micGrad)" stroke-width="2" stroke-linecap="round"/>
          <line x1="8" y1="22" x2="16" y2="22" stroke="url(#micGrad)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="sparsh-text">Sparsh</span>
      </h1>
      <div class="show-date">🗓 June 13th, 2026</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-icon btn-secondary" id="refreshBtn" title="Refresh from Supabase">🔄</button>
      <button class="btn btn-icon btn-secondary" id="exportBtn" title="Export to Excel">📥</button>
    </div>
  </div>
</header>

<div class="toolbar">
  <button class="btn btn-primary" id="addBtn">➕ Add Song</button>
  <div class="spacer"></div>
  <span id="status-msg">Connecting…</span>
</div>

<div id="addFormContainer" style="display:none;"></div>

<div class="table-wrap">
  <div id="loadingWrap" class="loading-wrap">
    <div class="spinner"></div>
    <p style="color:var(--text-dim)">Loading setlist…</p>
  </div>
  <table id="songTable" style="display:none;">
    <thead>
      <tr>
        <th></th>
        <th>#</th>
        <th>Song Name</th>
        <th>Singer(s)</th>
        <th>Karaoke</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="songBody"></tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="icon">🎵</div>
    <p>No songs yet. Add your first song!</p>
  </div>
</div>

<!-- Singers popup -->
<div id="singersPopup" class="singers-popup" style="display:none;"></div>

<!-- Karaoke Modal -->
<div id="karaokeModal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">🎶 Karaoke Player</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// ⚙️  SUPABASE CONFIG — replace with your own
// ─────────────────────────────────────────────
const SUPABASE_URL = 'https://afnxggkjsxezrbhnntwl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_YenvzolmYET7XAJF_4M9Ag_yJH2AdRG';
const TABLE = 'songs';
// ─────────────────────────────────────────────

const COUSINS = ['Ravi','Soujanya','Soumya','Sravan','Saradhi','Harini','Ananya','Maanya'];

let supabase_client;
let songs = [];
let editingCell = null;
let singersPopupData = null; // { rowId, currentSingers, anchor }
let dragSrc = null;

// ── INIT ──
try {
  supabase_client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  fetchSongs();
} catch(e) {
  setStatus('Config error: set your Supabase URL & Key', 'err');
  showLoading(false);
}

// ── SUPABASE CRUD ──
async function fetchSongs() {
  showLoading(true);
  setStatus('Fetching…');
  try {
    const { data, error } = await supabase_client
      .from(TABLE).select('*').order('position', { ascending: true });
    if (error) throw error;
    songs = data || [];
    renderTable();
    setStatus(`${songs.length} song${songs.length!==1?'s':''} loaded`, 'ok');
  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
    showToast('Failed to load: ' + e.message, 'error');
  }
  showLoading(false);
}

async function insertSong(song) {
  const pos = songs.length ? Math.max(...songs.map(s=>s.position||0)) + 1 : 1;
  const { data, error } = await supabase_client.from(TABLE).insert([{
    song_name: song.song_name,
    singers: song.singers,
    karaoke_link: song.karaoke_link,
    position: pos
  }]).select().single();
  if (error) throw error;
  songs.push(data);
  songs.sort((a,b)=>(a.position||0)-(b.position||0));
  renderTable();
  setStatus(`${songs.length} songs`, 'ok');
  showToast('Song added! 🎵', 'success');
}

async function updateSong(id, fields) {
  const { error } = await supabase_client.from(TABLE).update(fields).eq('id', id);
  if (error) { showToast('Save failed: ' + error.message, 'error'); return false; }
  const idx = songs.findIndex(s=>s.id===id);
  if (idx!==-1) songs[idx] = { ...songs[idx], ...fields };
  return true;
}

async function deleteSong(id) {
  const { error } = await supabase_client.from(TABLE).delete().eq('id', id);
  if (error) { showToast('Delete failed: ' + error.message, 'error'); return; }
  songs = songs.filter(s=>s.id!==id);
  renderTable();
  setStatus(`${songs.length} songs`, 'ok');
  showToast('Song removed', 'success');
}

async function savePositions() {
  const updates = songs.map((s,i) => ({ id: s.id, position: i+1 }));
  for (const u of updates) {
    await supabase_client.from(TABLE).update({ position: u.position }).eq('id', u.id);
    const idx = songs.findIndex(s=>s.id===u.id);
    if (idx!==-1) songs[idx].position = u.position;
  }
}

// ── RENDER ──
function renderTable() {
  const tbody = document.getElementById('songBody');
  const table = document.getElementById('songTable');
  const empty = document.getElementById('emptyState');
  tbody.innerHTML = '';
  if (!songs.length) { table.style.display='none'; empty.style.display='block'; return; }
  table.style.display='table'; empty.style.display='none';

  songs.forEach((song, idx) => {
    const tr = document.createElement('tr');
    tr.dataset.id = song.id;
    tr.draggable = true;

    // Drag handle
    const tdDrag = document.createElement('td');
    tdDrag.className = 'drag-handle';
    tdDrag.textContent = '⠿';
    tr.appendChild(tdDrag);

    // Number
    const tdNum = document.createElement('td');
    tdNum.className = 'row-num';
    tdNum.textContent = idx + 1;
    tr.appendChild(tdNum);

    // Song name
    const tdName = document.createElement('td');
    tdName.appendChild(makeEditableCell(song, 'song_name', song.song_name || '—'));
    tr.appendChild(tdName);

    // Singers
    const tdSingers = document.createElement('td');
    tdSingers.appendChild(makeSingersCell(song));
    tr.appendChild(tdSingers);

    // Karaoke
    const tdLink = document.createElement('td');
    tdLink.appendChild(makeLinkCell(song));
    tr.appendChild(tdLink);

    // Actions
    const tdAct = document.createElement('td');
    const actDiv = document.createElement('div');
    actDiv.className = 'row-actions';
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger btn-sm';
    delBtn.innerHTML = '🗑';
    delBtn.title = 'Delete song';
    delBtn.onclick = () => { if(confirm(`Delete "${song.song_name}"?`)) deleteSong(song.id); };
    actDiv.appendChild(delBtn);
    tdAct.appendChild(actDiv);
    tr.appendChild(tdAct);

    // Drag events
    tr.addEventListener('dragstart', onDragStart);
    tr.addEventListener('dragover', onDragOver);
    tr.addEventListener('drop', onDrop);
    tr.addEventListener('dragend', onDragEnd);

    // Touch drag (mobile)
    setupTouchDrag(tr);

    tbody.appendChild(tr);
  });
}

function makeEditableCell(song, field, displayText) {
  const span = document.createElement('span');
  span.className = 'cell-text';
  span.textContent = displayText;
  span.title = 'Tap to edit';
  span.onclick = () => startInlineEdit(song, field, span);
  return span;
}

function startInlineEdit(song, field, span) {
  if (editingCell) finishEdit(false);
  const oldVal = song[field] || '';
  const input = document.createElement('input');
  input.className = 'cell-input';
  input.value = oldVal;
  input.placeholder = field === 'karaoke_link' ? 'Google Drive / YouTube link' : 'Song name';
  span.parentNode.replaceChild(input, span);
  input.focus();
  editingCell = { song, field, input, span };

  input.onblur = () => finishEdit(true);
  input.onkeydown = (e) => {
    if (e.key === 'Enter') finishEdit(true);
    if (e.key === 'Escape') finishEdit(false);
  };
}

async function finishEdit(save) {
  if (!editingCell) return;
  const { song, field, input, span } = editingCell;
  editingCell = null;
  const newVal = input.value.trim();
  if (save && newVal !== (song[field] || '')) {
    span.textContent = newVal || '—';
    input.parentNode.replaceChild(span, input);
    await updateSong(song.id, { [field]: newVal });
    // Re-render link cell if karaoke field changed
    if (field === 'karaoke_link') renderTable();
  } else {
    span.textContent = song[field] || '—';
    input.parentNode.replaceChild(span, input);
  }
}

function makeSingersCell(song) {
  const singers = song.singers || [];
  const div = document.createElement('div');
  div.className = 'singers-display';
  div.title = 'Tap to change singers';
  if (!singers.length) {
    const chip = document.createElement('span');
    chip.className = 'singer-chip empty';
    chip.textContent = 'Tap to assign';
    div.appendChild(chip);
  } else {
    singers.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'singer-chip';
      chip.textContent = name;
      div.appendChild(chip);
    });
  }
  div.onclick = (e) => showSingersPopup(song, div, e);
  return div;
}

function makeLinkCell(song) {
  const div = document.createElement('div');
  div.className = 'link-cell';
  const link = song.karaoke_link || '';

  const span = document.createElement('span');
  span.className = 'cell-text';
  span.textContent = link ? '🔗 Link' : 'No link';
  span.title = 'Tap to edit link';
  span.onclick = () => startInlineEdit(song, 'karaoke_link', span);
  div.appendChild(span);

  const playBtn = document.createElement('button');
  playBtn.className = 'play-btn';
  playBtn.title = 'Play karaoke';
  playBtn.innerHTML = '▶';
  if (!link) playBtn.disabled = true;
  playBtn.onclick = (e) => { e.stopPropagation(); openKaraokeModal(song); };
  div.appendChild(playBtn);
  return div;
}

// ── SINGERS POPUP ──
function showSingersPopup(song, anchor, e) {
  e.stopPropagation();
  const popup = document.getElementById('singersPopup');
  const selected = Array.isArray(song.singers) ? [...song.singers] : [];

  popup.innerHTML = '';
  const h4 = document.createElement('h4');
  h4.textContent = 'Select Singer(s)';
  popup.appendChild(h4);

  COUSINS.forEach(name => {
    const div = document.createElement('div');
    div.className = 'singer-option';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.id = 'sp_' + name;
    cb.checked = selected.includes(name);
    cb.onchange = () => {
      if (cb.checked) { if (!selected.includes(name)) selected.push(name); }
      else { const i = selected.indexOf(name); if(i>-1) selected.splice(i,1); }
    };
    const lbl = document.createElement('label');
    lbl.htmlFor = 'sp_' + name;
    lbl.textContent = name;
    lbl.style.cursor = 'pointer'; lbl.style.flex = '1';
    div.appendChild(cb); div.appendChild(lbl);
    div.onclick = () => { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); };
    popup.appendChild(div);
  });

  const footer = document.createElement('div');
  footer.className = 'singers-popup-footer';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost btn-sm';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => { popup.style.display='none'; };
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary btn-sm';
  saveBtn.textContent = 'Done';
  saveBtn.onclick = async () => {
    popup.style.display = 'none';
    await updateSong(song.id, { singers: selected });
    song.singers = selected;
    renderTable();
  };
  footer.appendChild(cancelBtn); footer.appendChild(saveBtn);
  popup.appendChild(footer);

  // Position popup
  const rect = anchor.getBoundingClientRect();
  popup.style.display = 'block';
  const popH = popup.offsetHeight || 320;
  let top = rect.bottom + 6;
  if (top + popH > window.innerHeight - 10) top = rect.top - popH - 6;
  popup.style.top = Math.max(10, top) + 'px';
  let left = rect.left;
  if (left + 280 > window.innerWidth - 10) left = window.innerWidth - 290;
  popup.style.left = Math.max(10, left) + 'px';
}

document.addEventListener('click', (e) => {
  const popup = document.getElementById('singersPopup');
  if (!popup.contains(e.target)) popup.style.display = 'none';
});

// ── KARAOKE MODAL ──
function openKaraokeModal(song) {
  const link = song.karaoke_link || '';
  if (!link) return;
  document.getElementById('modalTitle').textContent = '🎶 ' + (song.song_name || 'Karaoke');
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  const embedUrl = getEmbedUrl(link);
  if (embedUrl) {
    const wrap = document.createElement('div');
    wrap.className = 'video-wrap';
    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.allow = 'autoplay; encrypted-media';
    iframe.allowFullscreen = true;
    iframe.frameBorder = '0';
    wrap.appendChild(iframe);
    body.appendChild(wrap);
  } else {
    const msg = document.createElement('div');
    msg.className = 'video-link-msg';
    msg.innerHTML = `<p style="margin-bottom:14px">This link can't be embedded directly.<br>Open in your browser:</p><a href="${link}" target="_blank" rel="noopener">${link}</a>`;
    body.appendChild(msg);
  }
  document.getElementById('karaokeModal').style.display = 'flex';
}

function getEmbedUrl(link) {
  if (!link) return null;
  // YouTube
  const ytMatch = link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;
  // Google Drive
  const gdMatch = link.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
  if (gdMatch) return `https://drive.google.com/file/d/${gdMatch[1]}/preview`;
  // Drive share link
  const gdShare = link.match(/drive\.google\.com\/.*[?&]id=([a-zA-Z0-9_-]+)/);
  if (gdShare) return `https://drive.google.com/file/d/${gdShare[1]}/preview`;
  return null;
}

document.getElementById('modalClose').onclick = () => {
  document.getElementById('karaokeModal').style.display = 'none';
  document.getElementById('modalBody').innerHTML = ''; // stop playback
};
document.getElementById('karaokeModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('karaokeModal').style.display = 'none';
    document.getElementById('modalBody').innerHTML = '';
  }
});

// ── ADD SONG FORM ──
document.getElementById('addBtn').onclick = toggleAddForm;
let formOpen = false;

function toggleAddForm() {
  const container = document.getElementById('addFormContainer');
  if (formOpen) { container.style.display='none'; container.innerHTML=''; formOpen=false; document.getElementById('addBtn').textContent='➕ Add Song'; return; }
  formOpen = true;
  document.getElementById('addBtn').textContent = '✕ Cancel';
  let selectedSingers = [];
  container.style.display = 'block';
  container.innerHTML = `
    <div class="add-form">
      <h3>✨ New Song</h3>
      <div class="form-grid">
        <div class="form-group full">
          <label>Song Name *</label>
          <input class="form-input" id="fSongName" placeholder="Enter song name…" autocomplete="off">
        </div>
        <div class="form-group full">
          <label>Singers (tap to select)</label>
          <div class="form-singers" id="fSingers"></div>
        </div>
        <div class="form-group full">
          <label>Karaoke Link</label>
          <input class="form-input" id="fLink" placeholder="Google Drive or YouTube link…" autocomplete="off">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" id="cancelAddBtn">Cancel</button>
        <button class="btn btn-primary" id="saveAddBtn">💾 Save Song</button>
      </div>
    </div>`;

  const singersDiv = document.getElementById('fSingers');
  COUSINS.forEach(name => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'form-singer-btn';
    btn.textContent = name;
    btn.onclick = () => {
      if (selectedSingers.includes(name)) {
        selectedSingers = selectedSingers.filter(s=>s!==name);
        btn.classList.remove('selected');
      } else {
        selectedSingers.push(name);
        btn.classList.add('selected');
      }
    };
    singersDiv.appendChild(btn);
  });

  document.getElementById('cancelAddBtn').onclick = toggleAddForm;
  document.getElementById('saveAddBtn').onclick = async () => {
    const name = document.getElementById('fSongName').value.trim();
    if (!name) { showToast('Please enter a song name', 'error'); return; }
    const btn = document.getElementById('saveAddBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await insertSong({ song_name: name, singers: selectedSingers, karaoke_link: document.getElementById('fLink').value.trim() });
      toggleAddForm();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '💾 Save Song';
    }
  };
  document.getElementById('fSongName').focus();
}

// ── DRAG & DROP (Desktop) ──
function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('drag-over'));
  this.classList.add('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;
  const tbody = document.getElementById('songBody');
  const rows = [...tbody.querySelectorAll('tr')];
  const srcIdx = rows.indexOf(dragSrc);
  const tgtIdx = rows.indexOf(this);
  const [moved] = songs.splice(srcIdx, 1);
  songs.splice(tgtIdx, 0, moved);
  renderTable();
  savePositions();
  showToast('Order updated 🎶', 'success');
}
function onDragEnd() {
  document.querySelectorAll('tbody tr').forEach(r=>{ r.classList.remove('dragging'); r.classList.remove('drag-over'); });
  dragSrc = null;
}

// ── TOUCH DRAG (Mobile) ──
function setupTouchDrag(tr) {
  let startY, cloneEl, startIdx, animFrame;

  tr.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    if (!e.target.closest('.drag-handle')) return;
    e.preventDefault();
    startY = touch.clientY;
    startIdx = [...document.querySelectorAll('#songBody tr')].indexOf(tr);
    tr.classList.add('dragging');

    cloneEl = tr.cloneNode(true);
    cloneEl.style.cssText = `position:fixed;left:${tr.getBoundingClientRect().left}px;width:${tr.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;background:var(--surface2);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.5);`;
    cloneEl.style.top = tr.getBoundingClientRect().top + 'px';
    document.body.appendChild(cloneEl);
  }, { passive: false });

  tr.addEventListener('touchmove', (e) => {
    if (!cloneEl) return;
    e.preventDefault();
    const touch = e.touches[0];
    const dy = touch.clientY - startY;
    cloneEl.style.top = (tr.getBoundingClientRect().top + dy) + 'px';

    // Find target row
    const rows = [...document.querySelectorAll('#songBody tr')];
    rows.forEach(r => r.classList.remove('drag-over'));
    const elem = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetRow = elem && elem.closest('tr');
    if (targetRow && targetRow !== tr && rows.includes(targetRow)) {
      targetRow.classList.add('drag-over');
    }
  }, { passive: false });

  tr.addEventListener('touchend', (e) => {
    if (!cloneEl) return;
    tr.classList.remove('dragging');
    document.body.removeChild(cloneEl);
    cloneEl = null;

    const touch = e.changedTouches[0];
    const elem = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetRow = elem && elem.closest('tr');
    const rows = [...document.querySelectorAll('#songBody tr')];
    rows.forEach(r => r.classList.remove('drag-over'));

    if (targetRow && targetRow !== tr && rows.includes(targetRow)) {
      const tgtIdx = rows.indexOf(targetRow);
      const [moved] = songs.splice(startIdx, 1);
      songs.splice(tgtIdx, 0, moved);
      renderTable();
      savePositions();
      showToast('Order updated 🎶', 'success');
    }
  });
}

// ── EXPORT ──
document.getElementById('exportBtn').onclick = () => {
  if (!songs.length) { showToast('No songs to export', 'error'); return; }
  const rows = songs.map((s, i) => ({
    '#': i+1,
    'Song Name': s.song_name || '',
    'Singer(s)': Array.isArray(s.singers) ? s.singers.join(', ') : '',
    'Karaoke Link': s.karaoke_link || ''
  }));
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{ wch: 5 }, { wch: 35 }, { wch: 40 }, { wch: 60 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Setlist');
  XLSX.writeFile(wb, 'FamilyStageShow_Setlist.xlsx');
  showToast('Exported! 📥', 'success');
};

// ── REFRESH ──
document.getElementById('refreshBtn').onclick = () => fetchSongs();

// ── UTILS ──
function showLoading(show) {
  document.getElementById('loadingWrap').style.display = show ? 'block' : 'none';
  if (show) { document.getElementById('songTable').style.display='none'; document.getElementById('emptyState').style.display='none'; }
}

function setStatus(msg, type='') {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type;
}

let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 2800);
}
